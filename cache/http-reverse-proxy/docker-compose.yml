version: '3.9'
services:
  backend:
    build: ./backend
    container_name: cache-http-backend
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: cache-http-proxy
    depends_on:
      - backend
    ports:
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
